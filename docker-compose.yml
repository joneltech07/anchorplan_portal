services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: company-portal-app
        restart: always
        ports:
            - "0.0.0.0:8080:80"
        environment:
            - APP_ENV=${APP_ENV}
            - APP_DEBUG=${APP_DEBUG}
            - APP_URL=${APP_URL}
            - DB_CONNECTION=mysql
            - DB_HOST=db
            - DB_PORT=3306
            - DB_DATABASE=${DB_DATABASE}
            - DB_USERNAME=${DB_USERNAME}
            - DB_PASSWORD=${DB_PASSWORD}
            - REDIS_HOST=redis
            - REDIS_PORT=${REDIS_PORT}
        volumes:
            - ./storage:/var/www/html/storage
        depends_on:
            - db

    db:
        image: mysql:8.0
        container_name: company-portal-db
        restart: always
        ports:
            - "3307:3306"
        environment:
            - MYSQL_DATABASE=${DB_DATABASE}
              - MYSQL_USER=${DB_USERNAME}
              - MYSQL_PASSWORD=${DB_PASSWORD}
              - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
        volumes:
            - db_data:/var/lib/mysql

    phpmyadmin:
        image: phpmyadmin/phpmyadmin
        container_name: company-portal-phpmyadmin
        restart: always
        ports:
            - "8081:80"
        environment:
            - PMA_HOST=db
            - PMA_PORT=3306
        depends_on:
            - db

volumes:
    db_data:
